name: "PHP Lint and Code Quality"

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  php-lint:
    name: "PHP Lint"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ["7.2", "7.4", "8.0", "8.3"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer

      - name: Validate composer.json
        run: composer validate

      - name: Check PHP syntax
        run: |
          find . -type f -name '*.php' \
            -not -path './vendor/*' \
            -not -path './.git/*' \
            -not -path './build/*' \
            -exec php -l {} \;

  phpcs:
    name: "WordPress Coding Standards"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          tools: composer, phpcs

      - name: Install WordPress Coding Standards
        run: composer require --dev wp-coding-standards/wpcs

      - name: Configure PHPCS
        run: phpcs --config-set installed_paths vendor/wp-coding-standards/wpcs

      - name: Run PHPCS
        run: phpcs --standard=WordPress --report=summary --colors --extensions=php ./includes ./admin ./nginx-opcache-manager.php
        continue-on-error: true

  composer-deps:
    name: "Composer Dependencies"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          tools: composer

      - name: Install Dependencies
        run: composer install

      - name: Check PHP Version Compatibility
        run: composer diagnose
